 {% load static %}

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>PDV - {% block title %}{% endblock title %}</title>
    
    {% block css %}
     

    {% endblock css %}
    
    <link rel="icon" href="{% static 'assets/img/IC.png'%}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }
        
        #sidebar {
            background-color: #333;
            color: white;
            width: 250px;
            transition: all 0.3s;
        }
        
        #sidebar.collapsed {
            width: 60px;
        }
        
        #sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        
        #sidebar li {
            padding: 10px;
        }
        
        #sidebar a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        #sidebar i {
            margin-right: 10px;
            width: 20px;
        }
        
        #content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        #navbar {
            background-color: #f8f9fa;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        #main-content {
            padding: 20px;
            flex-grow: 1;
        }
        
        #footer {
        background-color: #f8f9fa;
        padding: 10px;
        text-align: center;
        position: fixed;
        width: 100%;
        bottom: 0;
    }
        



        #toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        #sidebar.collapsed .label {
            display: none;
        }
        
        @media (max-width: 1024px) {
            #sidebar {
                width: 60px;
            }
            
            #sidebar .label {
                display: none;
            }
        }
    </style>

</head>
<body>
    <div id="sidebar">
        <button id="toggle-btn"><i class="fas fa-bars  "></i></button>
        <ul>
           <li><a href="{% url 'main' %}"><i class="fas fa-tachometer-alt"></i><span class="label">Dashboard</span></a></li>
            <li><a href="{% url 'folder_list' %}"><i class="fas fa-folder"></i><span class="label">Folders</span></a></li>
            <li><a href="{% url 'keys' %}"><i class="fas fa-key"></i><span class="label">Keys</span></a></li>
            <li><a href="{% url 'tools' %}"><i class="fas fa-tools"></i><span class="label">Tools</span></a></li>
            <li><a href="{% url 'settings' %}"><i class="fas fa-cog"></i><span class="label">Settings</span></a></li>
            <li><a href="{% url 'list_trash' %}"><i class="fas fa-trash"></i><span class="label">Trash</span></a></li>
        </ul>
    </div>
    <div id="content">
        <div id="navbar">
            <div>PDV</div>
            <div>
                <i class="fas fa-bell"></i>
                <span>{{request.user}}</span>
            </div>
        </div>
         <div id="main-content">
            {% block content1 %}

            {% endblock content1 %}
        </div>
        <div id="footer">
             © {% now 'Y' %} :
            <a class="text-dark" href="https://github.com/cisco100/PersonalDocumentVault" target="_blank">PDV</a>
        </div>    
    </div>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>

    <script>
        const toggleBtn = document.getElementById('toggle-btn');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        function checkWindowSize() {
            if (window.innerWidth <= 1024) {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
        }

        window.addEventListener('resize', checkWindowSize);
        checkWindowSize(); // Check on initial load


    </script>


{% block js %}
{% endblock js %}
</body>
</html>
