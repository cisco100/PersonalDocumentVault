{% extends './base.html' %}
{% block title %}Share File{% endblock %}
{% load cosfilter %}
{% load static %}

{% block content1 %}

<style>
    main {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-12 col-xs-12">
        <div class="card card-default border rounded-0">
            <div class="card-header">
                <h5 class="card-title"><b>Shared File</b></h5>
            </div>
            <div class="card-body">
                <div class="container-fluid">
                    <dl>
                        <dt class="text-muted"><b>File Name :</b></dt>
                        <dd class="ps-4">{{ file.name }}</dd>
                        <dt class="text-muted"><b>Sent By:</b></dt>
                        <dd class="ps-4">{{file.owner }}</dd>
                        <dt class="text-muted"><b>Filename:</b></dt>
                        <dd class="ps-4">{{ file.file_path|replaceBlank:'uploads/' }}</dd>
                    </dl>
                    <center>
                        <a download="{{ file.file_path|replaceBlank:'uploads/' }}" href="{{ file.file_path.url }}" class="btn btn-primary rounded-pill col-6"><i class="fa fa-download"></i> Download File</a>
                    </center>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content1 %}
